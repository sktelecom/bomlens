# 사용자 문서 사이트 설정. 정본 마크다운은 docs/에 있고, 이 설정으로 GitHub Pages에
# 렌더링한다(검색, 사이드바, 한국어/영어). 룩은 Gemini API 문서(Google DevSite) 인상을
# MkDocs Material과 docs/stylesheets/extra.css로 재현하되, 강조색만 SK 브랜드 색을 쓴다.
# internal/(메인테이너 설계 문서)과 contributing/는 사이트 빌드에서 제외한다.
site_name: BomLens
site_description: BomLens is a local-first SBOM generator and open-source risk assessor. Produce a CycloneDX SBOM, an open-source notice, and a security and license risk report from source code, containers, binaries, firmware, or an SBOM you received — from the CLI or a browser UI, with no SaaS.
site_author: SK Telecom
site_url: https://sktelecom.github.io/sbom-tools/
repo_url: https://github.com/sktelecom/sbom-tools
repo_name: sktelecom/sbom-tools
edit_uri: edit/main/docs/
copyright: SK Telecom

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: images/logo.svg
  favicon: images/logo-mark.svg
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Get started: 빠른 시작
            First scan: 시작하기
            No-CLI quickstart: 비개발자 빠른 시작
            Web UI & app: 웹 UI·데스크톱
            Guides: 가이드
            By input type: 입력 시나리오
            Reports: 보고서 생성
            Supplier SBOM: 공급사 SBOM
            Firmware: 펌웨어 분석
            AI model: AI 모델
            Identify bundled OSS (C/C++): 번들 OSS 식별 (C/C++)
            Server SBOM: 서버 SBOM
            Upload: 업로드
            CI/CD: CI/CD 연동
            Outputs: 산출물
            Artifacts: 산출물 종류
            Reading reports: 보고서 읽는 법
            Advanced: 고급
            CLI reference: CLI 레퍼런스
            Docker image: Docker 이미지
            Ecosystems: 지원 생태계
            About: 프로젝트 정보
            Architecture: 아키텍처
            Pipeline by input: 입력 형태별 파이프라인
            Local-first: 로컬 우선 설계
            Package managers: 패키지 매니저
            Testing: 테스트
            Release notes: 릴리스 노트

extra:
  # 방문 분석(GoatCounter, 쿠키·개인정보 없음). goatcounter.com에서 사이트를 등록한 뒤
  # 받은 사이트 코드를 넣으면 켜진다. 비워두면 분석 스크립트를 출력하지 않는다.
  goatcounter: ""

exclude_docs: |
  internal/
  korean-style-guide.md

# Validate internal links and heading anchors against the rendered site. Anchors
# are checked with this config's own pymdownx slugify, so the result matches what
# the site actually serves (a generic GitHub-style checker disagrees on slugs that
# contain a removed symbol such as an em-dash). With `mkdocs build --strict` in CI,
# a link to a missing page or a stale heading anchor fails the build.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

nav:
  - Home: index.md
  - Get started:
      - First scan: start/first-scan.md
      - No-CLI quickstart: start/no-cli.md
      - Web UI & app: reference/ui.md
  - Guides:
      - By input type: guides/by-input.md
      - Reports: guides/reports.md
      - Supplier SBOM: guides/supplier-sbom.md
      - Firmware: guides/firmware.md
      - AI model: guides/ai-model.md
      - Identify bundled OSS (C/C++): guides/identify-vendored.md
      - Server SBOM: guides/server-delivery.md
      - Upload: guides/upload.md
      - CI/CD: guides/ci-cd.md
  - Outputs:
      - Artifacts: reference/artifacts.md
      - Reading reports: concepts/reports-explained.md
  - Advanced:
      - CLI reference: reference/cli.md
      - Docker image: reference/docker-image.md
      - Ecosystems: reference/ecosystems.md
  - About:
      - Architecture: concepts/architecture.md
      - Pipeline by input: concepts/pipeline-by-input.md
      - Local-first: concepts/local-first.md
      - Package managers: contribute/package-managers.md
      - Testing: contribute/testing.md
  - Release notes: https://github.com/sktelecom/sbom-tools/releases
