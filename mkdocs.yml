# 사용자 문서 사이트 설정. 정본 마크다운은 docs/에 있고, 이 설정으로 GitHub Pages에
# 렌더링한다(검색, 사이드바, 한국어/영어). 룩은 Gemini API 문서(Google DevSite) 인상을
# MkDocs Material과 docs/stylesheets/extra.css로 재현하되, 강조색만 SK 브랜드 색을 쓴다.
# internal/(메인테이너 설계 문서)과 contributing/는 사이트 빌드에서 제외한다.
site_name: BomLens
site_description: BomLens is a local-first SBOM generator and open-source risk assessor. Produce a CycloneDX SBOM, an open-source notice, and a security and license risk report from source code, containers, binaries, firmware, or an SBOM you received — from the CLI or a browser UI, with no SaaS.
site_author: SK Telecom
site_url: https://sktelecom.github.io/sbom-tools/
repo_url: https://github.com/sktelecom/sbom-tools
repo_name: sktelecom/sbom-tools
edit_uri: edit/main/docs/
copyright: SK Telecom

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: images/logo.svg
  favicon: images/logo-mark.svg
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Get started: 빠른 시작
            Guides: 가이드
            Reference: 레퍼런스
            Concepts: 개념
            Contributing: 기여
            Release notes: 릴리스 노트

extra:
  # 방문 분석(GoatCounter, 쿠키·개인정보 없음). goatcounter.com에서 사이트를 등록한 뒤
  # 받은 사이트 코드를 넣으면 켜진다. 비워두면 분석 스크립트를 출력하지 않는다.
  goatcounter: ""

exclude_docs: |
  internal/
  korean-style-guide.md

nav:
  - Home: index.md
  - Get started:
      - start/first-scan.md
      - start/no-cli.md
  - Guides:
      - guides/by-input.md
      - guides/reports.md
      - guides/supplier-sbom.md
      - guides/firmware.md
      - guides/upload.md
      - guides/ci-cd.md
  - Reference:
      - reference/cli.md
      - reference/artifacts.md
      - reference/ecosystems.md
      - reference/ui.md
      - reference/docker-image.md
  - Concepts:
      - concepts/architecture.md
      - concepts/local-first.md
      - concepts/reports-explained.md
  - Contributing:
      - contribute/package-managers.md
      - contribute/testing.md
  - Release notes: https://github.com/sktelecom/sbom-tools/releases
