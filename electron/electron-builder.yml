appId: com.sktelecom.sbom-generator
productName: BomLens
directories:
  output: dist-electron
  buildResources: build
files:
  - main.mjs
  - preload.mjs
  - lib/**/*
  - assets/**/*
  - package.json
# 백엔드와 React SPA는 스캐너 Docker 이미지가 서빙하므로 사이드카/프론트 동봉이 없다.
# 1차는 미서명(코드 서명 인증서 주체 미정). 정식 배포 시 win.certificate / mac.notarize 추가.
# 버전 없는 고정 파일명. 릴리스마다 이름이 같아 영구 다운로드 URL
# (releases/latest/download/BomLens-Setup.exe)이 성립한다. 버전은
# 파일명이 아니라 인스톨러 내부(extraMetadata.version, desktop.yml)에 주입된다.
# 타깃마다 확장자가 달라 .exe/.dmg/.AppImage가 구분된다.
artifactName: BomLens-Setup.${ext}
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.developer-tools
  identity: null
linux:
  target: AppImage
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
