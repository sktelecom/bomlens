<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BomLens</title>
    <style>
      /* 색은 커스텀 프로퍼티로 모으고, OS가 라이트 모드면 아래 미디어 쿼리가 덮어쓴다. */
      :root {
        color-scheme: light dark;
        --bg: #0a0a0c;
        --fg: #e7e7ea;
        --muted: #9a9aa2;
        --dim: #6f6f77;
        --panel: #131316;
        --border: #26262b;
        --line: #c7c7cd;
        --line-latest: #ffffff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f5f7;
          --fg: #1c1c21;
          --muted: #6b6b74;
          --dim: #8a8a92;
          --panel: #ffffff;
          --border: #d9d9de;
          --line: #3c3c44;
          --line-latest: #000000;
        }
      }
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 28px 32px 12px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      header p {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }
      #log {
        flex: 1;
        margin: 8px 32px 28px;
        padding: 16px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow-y: auto;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12.5px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .line {
        color: var(--line);
      }
      .line.latest {
        color: var(--line-latest);
      }
      #retry {
        display: none;
        margin: 0 32px 24px;
        align-self: flex-start;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        color: #ffffff;
        background: #ea002c;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #retry:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #version {
        margin: 0;
        padding: 0 32px 14px;
        font-size: 11.5px;
        color: var(--dim);
      }
      #lang-toggle {
        position: fixed;
        top: 20px;
        right: 24px;
        font-size: 12px;
        color: var(--dim);
        user-select: none;
      }
      #lang-toggle button {
        padding: 2px 4px;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
      }
      #lang-toggle button:disabled {
        color: var(--fg);
        cursor: default;
      }
    </style>
  </head>
  <body>
    <nav id="lang-toggle" aria-label="Language">
      <button type="button" data-lang="ko">KO</button>|<button type="button" data-lang="en">EN</button>
    </nav>
    <header>
      <img src="logo.svg" alt="BomLens — SBOM Generator" style="height: 40px; width: auto; display: block" />
      <p id="subtitle"></p>
    </header>
    <div id="log" aria-live="polite"></div>
    <button id="retry" type="button"></button>
    <footer id="version"></footer>
    <script>
      // 언어는 main.mjs가 ?lang= 쿼리로 넘긴다(ko 또는 en, 기본 en).
      const params = new URLSearchParams(location.search);
      const lang = params.get("lang") === "ko" ? "ko" : "en";
      document.documentElement.lang = lang;

      // 앱 버전은 main.mjs가 ?v= 쿼리로 넘긴다. 파일을 직접 열어 쿼리가 없으면 표시하지 않는다.
      const version = params.get("v");
      if (version) document.getElementById("version").textContent = `BomLens v${version}`;

      // 언어 토글: lang 쿼리만 바꾸고 나머지 쿼리(v 등)는 보존한 채 같은 화면을 다시 연다.
      // 현재 언어 버튼은 비활성으로 표시한다.
      for (const button of document.querySelectorAll("#lang-toggle button")) {
        if (button.dataset.lang === lang) {
          button.disabled = true;
        } else {
          button.addEventListener("click", () => {
            const next = new URLSearchParams(location.search);
            next.set("lang", button.dataset.lang);
            location.replace(`${location.pathname}?${next}`);
          });
        }
      }
      const STR = {
        ko: {
          subtitle: "준비 중입니다. 처음 실행이면 스캐너 이미지를 내려받느라 수 분 걸릴 수 있어요.",
          retry: "다시 시도",
        },
        en: {
          subtitle:
            "Getting ready. On the first run, downloading the scanner image can take a few minutes.",
          retry: "Try again",
        },
      };
      const s = STR[lang];
      document.getElementById("subtitle").textContent = s.subtitle;

      const log = document.getElementById("log");
      function add(line) {
        const prev = log.querySelector(".latest");
        if (prev) prev.classList.remove("latest");
        const el = document.createElement("div");
        el.className = "line latest";
        el.textContent = line;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
      }
      if (window.sbomDesktop && window.sbomDesktop.onStatus) {
        window.sbomDesktop.onStatus(add);
      }

      // 실패 종착 상태(failed-*)면 재시도 버튼을 보여준다. 재시도가 시작되면(checking)
      // main이 상태를 브로드캐스트하므로 그때 다시 숨긴다.
      const retry = document.getElementById("retry");
      retry.textContent = s.retry;
      if (window.sbomDesktop && window.sbomDesktop.onStartupState) {
        window.sbomDesktop.onStartupState(({ state }) => {
          if (String(state).startsWith("failed-")) {
            retry.style.display = "block";
            retry.disabled = false;
          } else {
            retry.style.display = "none";
          }
        });
      }
      retry.addEventListener("click", async () => {
        retry.disabled = true;
        const result = await window.sbomDesktop.retryStartup();
        // 가드에 걸려 거절되면(ok:false) 다시 누를 수 있게 되돌린다.
        if (!result || !result.ok) retry.disabled = false;
      });
    </script>
  </body>
</html>
