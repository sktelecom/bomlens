<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Docker required — SBOM Generator</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
        background: #0a0a0b;
        color: #e7e7ea;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        max-width: 560px;
        padding: 32px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.7;
        color: #c7c7cd;
      }
      ul {
        font-size: 14px;
        line-height: 1.8;
        color: #c7c7cd;
        padding-left: 18px;
      }
      a {
        color: #6ea8fe;
      }
      .hint {
        margin-top: 20px;
        font-size: 13px;
        color: #9a9aa2;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title"></h1>
      <p id="lead"></p>
      <p id="intro"></p>
      <ul>
        <li><a href="https://rancherdesktop.io/">Rancher Desktop</a> — <span id="opt-rancher"></span></li>
        <li><a href="https://docs.docker.com/engine/install/">WSL2 + docker-ce</a> — <span id="opt-wsl"></span></li>
        <li>
          <a href="https://www.docker.com/products/docker-desktop/">Docker Desktop</a> —
          <span id="opt-desktop"></span>
        </li>
      </ul>
      <p class="hint" id="hint"></p>
    </main>
    <script>
      // 언어는 main.mjs가 ?lang= 쿼리로 넘긴다(ko 또는 en, 기본 en).
      const params = new URLSearchParams(location.search);
      const lang = params.get("lang") === "ko" ? "ko" : "en";
      const reason = params.get("reason");
      document.documentElement.lang = lang;

      const STR = {
        ko: {
          title: "Docker가 필요합니다",
          titleNotRunning: "Docker 엔진을 켜 주세요",
          leadNotRunning:
            "Docker는 설치되어 있지만 엔진이 실행 중이 아닙니다. Rancher Desktop 또는 Docker Desktop을 켜고 아이콘이 안정될 때까지 기다린 뒤 이 앱을 다시 실행하세요.",
          leadNotInstalled: "Docker가 설치되어 있지 않거나 PATH에서 찾을 수 없습니다.",
          intro: "SBOM Generator는 스캐너를 Docker 컨테이너로 실행합니다. Windows에서 쓸 수 있는 무료 옵션:",
          optRancher: "GUI, 이 앱과 바로 동작(권장)",
          optWsl: "완전 무료",
          optDesktop: "규모가 큰 조직은 유료 라이선스 필요",
          hint: "설치하고 엔진을 켠 뒤 이 앱을 다시 실행하세요.",
        },
        en: {
          title: "Docker is required",
          titleNotRunning: "Please start the Docker engine",
          leadNotRunning:
            "Docker is installed but the engine isn't running. Start Rancher Desktop or Docker Desktop, wait until the icon settles, then relaunch this app.",
          leadNotInstalled: "Docker isn't installed or can't be found on your PATH.",
          intro: "SBOM Generator runs the scanner as a Docker container. Free options on Windows:",
          optRancher: "GUI, works with this app out of the box (recommended)",
          optWsl: "completely free",
          optDesktop: "larger organizations need a paid license",
          hint: "Install it, start the engine, then relaunch this app.",
        },
      };
      const s = STR[lang];

      document.getElementById("title").textContent =
        reason === "not-running" ? s.titleNotRunning : s.title;
      document.getElementById("lead").textContent =
        reason === "not-running" ? s.leadNotRunning : s.leadNotInstalled;
      document.getElementById("intro").textContent = s.intro;
      document.getElementById("opt-rancher").textContent = s.optRancher;
      document.getElementById("opt-wsl").textContent = s.optWsl;
      document.getElementById("opt-desktop").textContent = s.optDesktop;
      document.getElementById("hint").textContent = s.hint;
    </script>
  </body>
</html>
