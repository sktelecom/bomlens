name: Build and Publish Docker Images

# Two-stage architecture: we build only the images cdxgen does NOT provide —
#   (1) the lightweight post-process image (sbom-scanner)
#   (2) Android SDK images per compileSdk (sbom-scanner-android-sdk<API>)
# All language SBOM generation uses cdxgen's official images (pulled on-demand),
# so they are NOT built here.

on:
  push:
    branches:
      - main          # publish :latest so `--ui` (default image) tracks main
    tags:
      - 'v*.*.*'
    paths:            # only rebuild when image content changes (not docs-only)
      - 'docker/**'
      - '.github/workflows/docker-publish.yml'
  release:            # paths do NOT apply to release/dispatch — versioned
    types: [ published ]   # publishes always run regardless of changed files
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registry?'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sbom-scanner

jobs:
  # ---------------------------------------------------------------
  # (1) Post-process image: syft + Trivy + cosign + notice + UI
  # ---------------------------------------------------------------
  build-postprocess:
    name: Build post-process image
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach the image SBOM to the release
      id-token: write   # keyless cosign signing (Sigstore OIDC)
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      # Resolve the publish flag once and reuse it for push, signing, and attest.
      - name: Resolve publish flag
        id: flags
        run: echo "push=${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || inputs.push == true || github.ref == 'refs/heads/main') }}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          # Co-publish under two names from a single build (same digest):
          #   sbom-generator   — featured name, matches the product "SBOM Generator"
          #   sbom-scanner     — legacy name, kept so existing supplier pulls never break
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/sbom-generator
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.flags.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Supply-chain: dogfood our own signing and SBOM on the published image ---
      # The tool offers cosign signing (--sign) and SBOM generation to users; we do
      # the same to our own image. Keyless signatures use the GitHub OIDC token
      # (no key management): OIDC -> Fulcio cert -> Rekor transparency log.
      - name: Install cosign
        if: steps.flags.outputs.push == 'true'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
      - name: Install syft (pinned release tarball)
        if: steps.flags.outputs.push == 'true'
        env:
          SYFT_VERSION: v1.18.1   # keep in sync with docker/Dockerfile
        run: |
          ver="${SYFT_VERSION#v}"
          curl -sSfL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${ver}_linux_amd64.tar.gz" -o /tmp/syft.tgz
          sudo tar -C /usr/local/bin -xzf /tmp/syft.tgz syft
          syft version
      - name: Sign image and attest its SBOM
        if: steps.flags.outputs.push == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          gen="${REGISTRY}/${OWNER}/sbom-generator@${DIGEST}"
          leg="${REGISTRY}/${OWNER}/sbom-scanner@${DIGEST}"
          cosign sign --yes "$gen"
          cosign sign --yes "$leg"
          # CycloneDX SBOM of our own image, attached as a signed attestation.
          syft "$gen" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "$gen"
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "$leg"
      - name: Attach image SBOM to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: sbom.cdx.json
        continue-on-error: true

      # Supply-chain note: use a pinned Trivy CLI (not the trivy-action that had
      # a supply-chain incident). Keep TRIVY_VERSION in sync with docker/Dockerfile.
      - name: Install Trivy (pinned release tarball)
        if: github.event_name != 'pull_request'
        env:
          TRIVY_VERSION: v0.70.0
        run: |
          ver="${TRIVY_VERSION#v}"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${ver}_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          sudo tar -C /usr/local/bin -xzf /tmp/trivy.tgz trivy
          trivy --version
      - name: Scan Dockerfiles with Trivy
        if: github.event_name != 'pull_request'
        run: trivy config --quiet --format sarif --output trivy-config.sarif --exit-code 0 ./docker
      - name: Upload Dockerfile scan results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          sarif_file: 'trivy-config.sarif'
          category: trivy-config
        continue-on-error: true

      # Scan the actual published image (not just the Dockerfile) for known CVEs.
      - name: Scan published image with Trivy
        if: steps.flags.outputs.push == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
        run: trivy image --quiet --format sarif --output trivy-image.sarif --exit-code 0 "${REGISTRY}/${OWNER}/sbom-generator@${DIGEST}"
      - name: Upload image scan results
        if: steps.flags.outputs.push == 'true'
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: trivy-image
        continue-on-error: true

  # ---------------------------------------------------------------
  # (2) Android SDK images — one per compileSdk (cdxgen has none)
  # ---------------------------------------------------------------
  build-android:
    name: Build Android SDK image (API ${{ matrix.api }})
    runs-on: ubuntu-latest
    # Heavy (6× multi-arch). Skip on plain main pushes; only on tag/release/dispatch.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        api: [ 30, 31, 32, 33, 34, 35 ]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sbom-scanner-android-sdk${{ matrix.api }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./docker/android
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || inputs.push == true) }}
          build-args: |
            ANDROID_API=${{ matrix.api }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=android-${{ matrix.api }}
          cache-to: type=gha,mode=max,scope=android-${{ matrix.api }}

  summary:
    name: Build summary
    runs-on: ubuntu-latest
    needs: [ build-postprocess, build-android ]
    # always(): build-android is skipped on main pushes — still summarize.
    if: ${{ always() && github.event_name != 'pull_request' && needs.build-postprocess.result == 'success' }}
    steps:
      - run: |
          echo "## 🐳 Images built" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/sbom-generator\` (post-process, featured)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` (post-process, legacy alias)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/sbom-scanner-android-sdk{30..35}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Language SBOM generation uses cdxgen official images (pulled on-demand by scan-sbom.sh)." >> $GITHUB_STEP_SUMMARY
