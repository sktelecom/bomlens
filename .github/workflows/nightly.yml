name: Nightly (best-effort)

# Non-blocking checks that are too slow or too flaky for the per-PR critical
# path. This workflow is scheduled and manual only — it is never a required
# status check, so a red run here signals a problem to investigate without
# blocking any PR or release.
on:
  schedule:
    - cron: "27 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Full heavy-suite run (web UI E2E, comprehensive CLI E2E over ALL bundled
  # examples, docs walkthrough) via the same reusable workflow ci.yml uses on
  # main pushes. On quiet days (no push to main) this bounds drift in the
  # user-facing scan paths to 24 hours instead of "until the next merge".
  heavy-e2e:
    name: Heavy E2E (full)
    uses: ./.github/workflows/heavy-e2e.yml
    with:
      suites: web-e2e full-e2e docs-walkthrough
      examples_only: ""
      # Firmware coverage via the published image (fast pull instead of the
      # 20-30 min GPL build) — test-e2e.sh's firmware group auto-enables.
      firmware_pull: true

  # What a real user gets TODAY: pull the published image and run the docs
  # walkthrough and the full behavioral suite against it — not against repo
  # HEAD. This is the only lane that catches "the published image rotted"
  # (base-image CVE rebuilds, registry issues, a bad publish) and it also
  # verifies every version-pinned image tag the docs mention is pullable.
  published-user-journey:
    name: Published-image user journey
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Pull the published scanner image
        run: docker pull ghcr.io/sktelecom/bomlens:latest

      - name: Docs walkthrough against the published image
        env:
          SBOM_SCANNER_IMAGE: ghcr.io/sktelecom/bomlens:latest
        run: bash tests/test-docs-walkthrough.sh

      - name: Full CLI behavioral suite against the published image
        env:
          SBOM_SCANNER_IMAGE: ghcr.io/sktelecom/bomlens:latest
        run: bash tests/test-e2e.sh

      # Every ghcr.io/sktelecom/*:x.y.z the docs pin must actually be pullable
      # (the offline drift check only verifies the git tag exists).
      - name: Verify pinned doc tags are pullable
        run: |
          set -e
          pins="$(grep -rhoE 'ghcr\.io/sktelecom/[a-z0-9._-]+:[0-9]+\.[0-9]+\.[0-9]+' \
                    README.md docs 2>/dev/null | sort -u)"
          [ -z "$pins" ] && { echo "no pinned tags in docs"; exit 0; }
          rc=0
          while IFS= read -r pin; do
            if docker manifest inspect "$pin" >/dev/null 2>&1; then
              echo "OK: $pin"
            else
              echo "::error::docs pin $pin, which is not pullable"
              rc=1
            fi
          done <<< "$pins"
          exit "$rc"

  # Android (AGP) release-scope regression. Resolves the full androidx graph from
  # Google Maven through the published android-sdk image, so it is slow and
  # network-dependent — hence nightly, not per-PR. Guards the build-prep filter
  # that keeps Android SBOMs to the deployable release runtime classpath.
  android-scope:
    name: Android release scope
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Pull the published android-sdk image
        run: docker pull ghcr.io/sktelecom/bomlens-android-sdk34:latest

      - name: Android release-scope regression
        env:
          SBOM_ANDROID_IMAGE: ghcr.io/sktelecom/bomlens-android-sdk34:latest
        run: bash tests/test-android-scope.sh

  # External links rot on their own schedule, so they are checked here (with
  # retries and a cache) rather than on PRs — matching the split anticipated in
  # scripts/check-doc-links.sh, which covers internal links on every PR.
  doc-links:
    name: External doc links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install lychee
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release view --repo lycheeverse/lychee --json tagName --jq .tagName)"
          gh release download "$tag" --repo lycheeverse/lychee \
            --pattern '*x86_64-unknown-linux-gnu.tar.gz' --output /tmp/lychee.tgz
          # The binary is not always at the archive root (layout varies by
          # release), so extract everything and locate it rather than naming it.
          mkdir -p /tmp/lychee-bin
          tar -C /tmp/lychee-bin -xzf /tmp/lychee.tgz
          bin="$(find /tmp/lychee-bin -type f -name lychee | head -1)"
          [ -n "$bin" ] || { echo "::error::lychee binary not found in the release archive"; exit 1; }
          install -m 0755 "$bin" /usr/local/bin/lychee
          lychee --version

      - name: Check external links
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          lychee --config tests/lychee.toml --no-progress \
            README.md 'docs/**/*.md' 'examples/**/*.md'

  # Desktop lanes (unit + boot smoke + installer build/smoke on Windows and
  # macOS) run daily so Electron/runner/OS drift surfaces within 24h even when
  # electron/ itself has not changed.
  desktop:
    name: Desktop
    # The called workflow's build-desktop job declares contents: write (used
    # only by its tag-release attach step, which never runs here). A caller
    # granting LESS than a called job requests fails the whole run at startup
    # ("workflow file issue", zero jobs), so this grant is required even though
    # nothing in the nightly path writes. Secrets are inherited so the signing
    # secrets keep working if they are ever configured.
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/desktop.yml

  # REMOVED (2026-07-16): "macOS real scan (Colima)". The job was written off
  # as "slow and flaky (infra)", but the measured record says otherwise: its
  # last 19 runs all failed deterministically in 17-40 seconds at
  # `colima start`, and the scan step never executed once. On the hosted
  # arm64 runner (macos-latest = macos-26-arm64) neither backend boots:
  #   - vz: the VM exits immediately after boot (nested virtualization is not
  #     available on hosted Apple Silicon runners),
  #   - qemu: lima's QEMU driver panics ("send on closed channel",
  #     qemu_driver.go:412, lima 2.1.3) — verified by a one-off experiment
  #     run (29487846488) on 2026-07-16.
  # A permanently red best-effort job only burns runner time and reads as
  # "occasionally passing" when it never does. macOS real-scan coverage is a
  # maintainer-run local check (Colima works fine on real Apple Silicon
  # hardware; releases are verified that way). Re-add a hosted job only when
  # GitHub's arm64 macOS runners support nested virtualization or lima's
  # qemu driver boots there.

  # Nightly is never a required check, so a red run is invisible unless someone
  # opens the Actions tab. Surface failures as a single rolling issue instead:
  # first failure opens it, repeats comment on it, and it is closed by hand once
  # the cause is fixed.
  report-failure:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [heavy-e2e, published-user-journey, android-scope, doc-links, desktop]
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the nightly-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAVY: ${{ needs.heavy-e2e.result }}
          JOURNEY: ${{ needs.published-user-journey.result }}
          ANDROID: ${{ needs.android-scope.result }}
          LINKS: ${{ needs.doc-links.result }}
          DESKTOP: ${{ needs.desktop.result }}
        run: |
          title="Nightly checks are failing"
          body="Nightly run failed: ${RUN_URL}
          - Heavy E2E: ${HEAVY}
          - Published-image user journey: ${JOURNEY}
          - Android release scope: ${ANDROID}
          - External doc links: ${LINKS}
          - Desktop: ${DESKTOP}
          (macOS real scan is best-effort and excluded from this alarm.)"
          num=$(gh issue list --repo "$REPO" --state open --search "in:title \"$title\"" \
                --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi
