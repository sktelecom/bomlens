name: Docs site

# docs/ 정본 마크다운을 MkDocs Material로 빌드해 GitHub Pages(gh-pages 브랜치)에 배포한다.
# 사이트 소스는 docs/이며, internal/과 contributing/는 mkdocs.yml의 exclude_docs로 제외된다.
# 최초 1회 저장소 Settings > Pages에서 소스를 "gh-pages 브랜치"로 지정해야 한다.
on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - overrides/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - overrides/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # PR에서는 배포 없이 빌드만 검증한다. --strict라 깨진 링크·설정 오류가
  # main 병합 전에 드러난다.
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # 시스템 파이썬은 externally-managed라 venv로 격리해 의존성을 설치한다.
      - name: Build (no deploy)
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt
          mkdocs build --strict

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # gh-deploy가 gh-pages 브랜치로 푸시하므로 쓰기 권한이 필요하다.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # 시스템 파이썬은 externally-managed라 venv로 격리해 의존성을 설치한다.
      - name: Build and deploy
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt
          mkdocs build --strict
          mkdocs gh-deploy --force --no-history
