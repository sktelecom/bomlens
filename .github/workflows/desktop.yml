name: Desktop App

# Electron 데스크톱 앱(인스톨러) 빌드. 스캐너는 여전히 Docker로 실행되며, 이 앱은
# 더블클릭 진입점을 제공한다. electron/ 변경 PR, 수동 실행, 태그 푸시에서 빌드한다.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - electron/**
      - .github/workflows/desktop.yml
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  test:
    # container.mjs 순수 로직 단위 테스트(electron 불필요, 빠름).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test test/*.test.mjs

  build-desktop:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win nsis
            artifact: desktop-windows
          - os: macos-latest
            args: --mac dmg
            artifact: desktop-macos
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      # 1차 미서명: mac 자동 서명 탐색을 끄고, 어떤 레지스트리에도 publish 하지 않는다.
      - name: Build installer
        run: npx --no-install electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            electron/dist-electron/*.exe
            electron/dist-electron/*.dmg
          if-no-files-found: warn
