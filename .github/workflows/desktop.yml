name: Desktop App

# Electron 데스크톱 앱(인스톨러) 빌드. 스캐너는 여전히 Docker로 실행되며, 이 앱은
# 더블클릭 진입점을 제공한다. electron/ 변경 PR, 수동 실행, 태그 푸시에서 빌드한다.
on:
  workflow_dispatch:
  # Callable from other workflows (nightly runs it daily so Electron/runner/OS
  # drift surfaces within 24h even when electron/ itself has not changed).
  workflow_call:
  pull_request:
    paths:
      - electron/**
      - .github/workflows/desktop.yml
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  test:
    # container.mjs 순수 로직 단위 테스트(electron 불필요, 빠름).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: node --test test/*.test.mjs

  build-desktop:
    needs: test
    # 태그 푸시일 때 인스톨러를 해당 릴리스에 첨부하므로 쓰기 권한이 필요하다.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win nsis
            artifact: desktop-windows
          # --universal 필수: CLI 타깃 명시가 yml의 arch 설정을 덮어쓰므로,
          # 이 플래그가 없으면 러너 아키텍처(arm64) 단일 빌드가 된다.
          - os: macos-latest
            args: --mac dmg --universal
            artifact: desktop-macos
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      # 부팅 스모크: 인스톨러 빌드 전에 앱이 이 OS에서 실제로 켜지고 첫 화면(en/ko)을
      # 렌더하는지 확인한다. SBOM_SMOKE로 Docker/컨테이너 기동은 건너뛰어 결정론적이다.
      - name: Boot smoke (app launches and renders)
        run: npm run test:smoke
      # 서명은 시크릿이 있을 때만 켜진다(없으면 미서명). 어떤 레지스트리에도 publish 하지 않는다.
      # 태그 빌드는 버전을 태그에서 주입해 인스톨러 파일명이 릴리스와 항상 일치하게 한다.
      - name: Build installer
        shell: bash
        run: |
          # Unconfigured secrets arrive as EMPTY env vars, and electron-builder
          # treats an empty CSC_LINK as "certificate provided", then fails trying
          # to import it ("not a file"). PR builds never hit this because signing
          # is skipped on pull requests entirely — only push/dispatch builds do.
          # Unset the empty ones so unsigned builds stay unsigned.
          [ -n "${CSC_LINK:-}" ] || unset CSC_LINK CSC_KEY_PASSWORD
          [ -n "${WIN_CSC_LINK:-}" ] || unset WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
          [ -n "${APPLE_ID:-}" ] || unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          args=(${{ matrix.args }} --publish never)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            args+=("-c.extraMetadata.version=${GITHUB_REF#refs/tags/v}")
          fi
          npx --no-install electron-builder "${args[@]}"
        env:
          # Code signing is inert until these repo secrets are configured; without
          # them the build stays unsigned (current behavior). Keep the Windows and
          # macOS certificates in SEPARATE secrets: the generic CSC_LINK is also read
          # by the macOS build, so a Windows .pfx placed there would be imported as
          # an Apple certificate on the macos runner. See electron/README.md.
          # Windows Authenticode certificate (.pfx) — signs the NSIS installer.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS Developer ID Application certificate (.p12).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization — all-or-none: setting only part of the APPLE_*
          # trio makes electron-builder fail the build with a configuration error.
          # When absent, notarization is skipped with a warning (signing itself is
          # only attempted when a certificate is present, so unsigned builds never
          # reach the notarization step).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Stay unsigned on macOS unless a Developer ID cert is provided.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            electron/dist-electron/*.exe
            electron/dist-electron/*.dmg
          if-no-files-found: warn
      # 태그 릴리스에는 같은 릴리스에 인스톨러를 덧붙여 일반 사용자가 바로 받게 한다.
      # PR과 수동 실행에서는 이 단계를 건너뛰고 위 아티팩트만 남긴다.
      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          # Preserve the draft state set by release.yml's create-release: without
          # this, action-gh-release's default (draft: false) would publish the
          # release as soon as the installers attach, bypassing the release-gate.
          draft: true
          files: |
            electron/dist-electron/*.exe
            electron/dist-electron/*.dmg
          fail_on_unmatched_files: false
