name: Release assets verify

# Confirms the permanent one-click download URLs the docs advertise actually
# resolve to a real installer. Runs after a release is published and on a weekly
# schedule (asset hosting can change under us). Manual dispatch is available too.
# Not a required check — a failure means a download a first-time user is told to
# click is missing or broken.
on:
  release:
    types: [published]
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:
    inputs:
      tag:
        description: "Run the full release-gate check (installers + published image + documented command) against this tag, e.g. v1.5.1"
        type: string
        required: false

permissions:
  contents: read
  packages: read

jobs:
  verify-downloads:
    name: Verify desktop download URLs
    runs-on: ubuntu-latest
    steps:
      - name: Check latest-release installers resolve
        run: |
          base="https://github.com/sktelecom/sbom-tools/releases/latest/download"
          # Minimum plausible installer size (bytes); a real .exe/.dmg is tens of MB.
          min=1000000
          fail=0
          # Published checksums (releases since the gate started appending
          # installer lines). Older releases lack these lines — fall back to
          # the size check so the weekly schedule stays green across the
          # transition.
          curl -sL -o SHA256SUMS.txt "$base/SHA256SUMS.txt" || true
          for file in BomLens-Setup.exe BomLens-Setup.dmg; do
            url="$base/$file"
            if ! curl -sL -o "$file" "$url"; then
              echo "❌ $file → download failed"
              fail=1
              continue
            fi
            len="$(stat -c %s "$file" 2>/dev/null || echo 0)"
            if [ "$len" -lt "$min" ]; then
              echo "❌ $file → size ${len} (expected ≥ ${min} bytes)"
              fail=1
              continue
            fi
            if grep -q "  $file\$" SHA256SUMS.txt 2>/dev/null; then
              if grep "  $file\$" SHA256SUMS.txt | sha256sum --check --quiet -; then
                echo "✓ $file → ${len} bytes, checksum matches SHA256SUMS.txt"
              else
                echo "❌ $file → checksum does NOT match SHA256SUMS.txt"
                fail=1
              fi
            else
              echo "✓ $file → ${len} bytes (no checksum published for this release)"
            fi
          done
          [ "$fail" -eq 0 ] || { echo "one or more advertised downloads are missing or broken"; exit 1; }

  # Dry-run of the release-gate check against an existing tag — same script the
  # Release workflow runs before publishing, so the gate logic can be exercised
  # without cutting a release. Only runs when a tag is supplied on manual dispatch.
  verify-release-full:
    name: Full release-gate dry-run
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify release entry points
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/verify-release.sh "${{ inputs.tag }}"
