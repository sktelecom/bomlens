name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Image tags follow SemVer without the leading "v" (metadata-action {{version}}).
          echo "image_version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/## \[${{ steps.version.outputs.version }}\]/,/## \[/p" CHANGELOG.md | sed '$d' | sed '1{/^## \[/d}')
          else
            CHANGELOG=$(git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" 2>/dev/null || echo "Initial release")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## BomLens ${{ steps.version.outputs.version }}

            Generate a CycloneDX SBOM, an open-source notice (고지문), and a security report from your source code — or assess the open-source risk of an SBOM or firmware you receive.

            ### Changes

            ${{ steps.changelog.outputs.changelog }}

            ### Installation

            #### Desktop app (double-click, no CLI)
            Download `BomLens-Setup.exe` (Windows) or `BomLens-Setup.dmg` (macOS) from the assets below. Unsigned for now; if Windows SmartScreen warns, choose "More info", then "Run anyway".

            #### Scripts
            ```bash
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/scan-sbom.sh
            chmod +x scan-sbom.sh
            ```
            
            #### Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/sbom-generator:${{ steps.version.outputs.image_version }}   # legacy alias: sbom-scanner
            ```
            
            ### Documentation
            
            - [Getting Started](https://sktelecom.github.io/bomlens/start/first-scan/)
            - [Notice, security & risk reports](https://sktelecom.github.io/bomlens/guides/reports/)
            - [Usage Guide](https://sktelecom.github.io/bomlens/reference/cli/)
            - [Examples](https://sktelecom.github.io/bomlens/reference/ecosystems/)
          # Created as a draft so it is not shown as the latest release until the
          # release-gate job confirms a first-time user's entry points actually
          # work (installers attached, published image runs the documented
          # command). The gate flips this to published on success.
          draft: true
          prerelease: false
  
  upload-assets:
    name: Upload Release Assets
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Scripts
          cp scripts/scan-sbom.sh release-assets/
          chmod +x release-assets/scan-sbom.sh
          tar -czf release-assets/bomlens-cli-linux.tar.gz -C scripts scan-sbom.sh
          
          # Windows runtime bundle: both launchers, the orchestration script,
          # and the one lib file scan-sbom.sh mounts into the container for
          # source scans (docker/lib/build-prep.sh). Paths are preserved so the
          # scan-sbom.bat -> scan-sbom.sh -> REPO_DIR/docker/lib resolution works
          # after unzip. sbom-ui.bat is self-contained (double-click web UI).
          zip -r release-assets/bomlens-cli-windows.zip \
            scripts/scan-sbom.sh scripts/scan-sbom.bat scripts/sbom-ui.bat \
            docker/lib/build-prep.sh

          # Examples
          tar -czf release-assets/bomlens-examples-${{ needs.create-release.outputs.version }}.tar.gz examples/

          # Complete package (includes docker/ so the host has build-prep.sh for CLI source scans)
          tar -czf release-assets/bomlens-${{ needs.create-release.outputs.version }}.tar.gz scripts/ docker/ examples/ docs/ README.md LICENSE

          # Checksums so downloaders can verify integrity of these assets.
          ( cd release-assets && sha256sum \
            bomlens-cli-linux.tar.gz \
            bomlens-cli-windows.zip \
            bomlens-examples-${{ needs.create-release.outputs.version }}.tar.gz \
            bomlens-${{ needs.create-release.outputs.version }}.tar.gz \
            > SHA256SUMS.txt )

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          # Keep the release a draft — action-gh-release defaults draft to false,
          # which would otherwise publish it here, before the release-gate has
          # verified it. Only the gate's `gh release edit --draft=false` publishes.
          draft: true
          files: |
            release-assets/bomlens-cli-linux.tar.gz
            release-assets/bomlens-cli-windows.zip
            release-assets/bomlens-examples-${{ needs.create-release.outputs.version }}.tar.gz
            release-assets/bomlens-${{ needs.create-release.outputs.version }}.tar.gz
            release-assets/SHA256SUMS.txt
  
  # Run the docs walkthrough on the TAGGED COMMIT before the gate publishes
  # anything. verify-release.sh re-runs it later on the published image, but
  # only after polling for async assets; a broken runnable block in the docs
  # should stop the release as early and cheaply as possible. Runs in parallel
  # with upload-assets, so it adds little wall-clock time.
  docs-walkthrough:
    name: Docs Walkthrough (release gate)
    uses: ./.github/workflows/heavy-e2e.yml
    with:
      suites: docs-walkthrough

  release-gate:
    name: Release Gate (verify entry points, then publish)
    needs: [create-release, upload-assets, docs-walkthrough]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Confirm the recommended entry points work for THIS release before it is
      # shown to users: the desktop installers are attached (built async by
      # desktop.yml), and the documented first-scan command produces a valid SBOM
      # on the actual published image (pushed async by docker-publish.yml). Both
      # are polled until ready, then exercised; failure leaves the release a draft.
      - name: Verify the release is ready for users
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/verify-release.sh "${{ needs.create-release.outputs.version }}"

      # The installers are attached by desktop.yml after upload-assets wrote
      # SHA256SUMS.txt, so their checksums are appended here — after the verify
      # step confirmed both installers are present (every other asset writer has
      # finished by then) and before the release goes public.
      - name: Add installer checksums to SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/attach-installer-checksums.sh "${{ needs.create-release.outputs.version }}"

      # Only now make it the public, latest release.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.create-release.outputs.version }}" \
            --repo "${{ github.repository }}" --draft=false --latest

  summary:
    name: Release Summary
    needs: [create-release, upload-assets, docs-walkthrough, release-gate]
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🎉 Release ${{ needs.create-release.outputs.version }} Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- [Linux/macOS Script](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/bomlens-cli-linux.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- [Windows Script](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/bomlens-cli-windows.zip)" >> $GITHUB_STEP_SUMMARY
          echo "- [Examples](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/bomlens-examples-${{ needs.create-release.outputs.version }}.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/sbom-generator:${{ needs.create-release.outputs.version }}   # legacy alias: sbom-scanner" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
