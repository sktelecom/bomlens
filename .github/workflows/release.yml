name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Image tags follow SemVer without the leading "v" (metadata-action {{version}}).
          echo "image_version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/## \[${{ steps.version.outputs.version }}\]/,/## \[/p" CHANGELOG.md | sed '$d' | sed '1{/^## \[/d}')
          else
            CHANGELOG=$(git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" 2>/dev/null || echo "Initial release")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## BomLens ${{ steps.version.outputs.version }}

            Generate a CycloneDX SBOM, an open-source notice (고지문), and a security report from your source code — or assess the open-source risk of an SBOM or firmware you receive.

            ### Changes

            ${{ steps.changelog.outputs.changelog }}

            ### Installation

            #### Desktop app (double-click, no CLI)
            Download `SBOM-Generator-*.exe` (Windows) or `.dmg` (macOS) from the assets below. Unsigned for now; if Windows SmartScreen warns, choose "More info", then "Run anyway".

            #### Scripts
            ```bash
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/scan-sbom.sh
            chmod +x scan-sbom.sh
            ```
            
            #### Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/sbom-generator:${{ steps.version.outputs.image_version }}   # legacy alias: sbom-scanner
            ```
            
            ### Documentation
            
            - [Getting Started](https://github.com/${{ github.repository }}/blob/main/docs/getting-started.md)
            - [License-manager quickstart](https://github.com/${{ github.repository }}/blob/main/docs/notice-quickstart.md)
            - [Usage Guide](https://github.com/${{ github.repository }}/blob/main/docs/usage-guide.md)
            - [Examples](https://github.com/${{ github.repository }}/blob/main/docs/examples-guide.md)
          draft: false
          prerelease: false
  
  upload-assets:
    name: Upload Release Assets
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Scripts
          cp scripts/scan-sbom.sh release-assets/
          chmod +x release-assets/scan-sbom.sh
          tar -czf release-assets/scan-sbom-linux.tar.gz -C scripts scan-sbom.sh
          
          # Windows runtime bundle: both launchers, the orchestration script,
          # and the one lib file scan-sbom.sh mounts into the container for
          # source scans (docker/lib/build-prep.sh). Paths are preserved so the
          # scan-sbom.bat -> scan-sbom.sh -> REPO_DIR/docker/lib resolution works
          # after unzip. sbom-ui.bat is self-contained (double-click web UI).
          zip -r release-assets/scan-sbom-windows.zip \
            scripts/scan-sbom.sh scripts/scan-sbom.bat scripts/sbom-ui.bat \
            docker/lib/build-prep.sh

          # Examples
          tar -czf release-assets/sbom-tools-examples-${{ needs.create-release.outputs.version }}.tar.gz examples/

          # Complete package (includes docker/ so the host has build-prep.sh for CLI source scans)
          tar -czf release-assets/sbom-tools-${{ needs.create-release.outputs.version }}.tar.gz scripts/ docker/ examples/ docs/ README.md LICENSE

          # Checksums so downloaders can verify integrity of these assets.
          ( cd release-assets && sha256sum \
            scan-sbom-linux.tar.gz \
            scan-sbom-windows.zip \
            sbom-tools-examples-${{ needs.create-release.outputs.version }}.tar.gz \
            sbom-tools-${{ needs.create-release.outputs.version }}.tar.gz \
            > SHA256SUMS.txt )

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            release-assets/scan-sbom-linux.tar.gz
            release-assets/scan-sbom-windows.zip
            release-assets/sbom-tools-examples-${{ needs.create-release.outputs.version }}.tar.gz
            release-assets/sbom-tools-${{ needs.create-release.outputs.version }}.tar.gz
            release-assets/SHA256SUMS.txt
  
  summary:
    name: Release Summary
    needs: [create-release, upload-assets]
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🎉 Release ${{ needs.create-release.outputs.version }} Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- [Linux/macOS Script](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/scan-sbom-linux.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- [Windows Script](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/scan-sbom-windows.zip)" >> $GITHUB_STEP_SUMMARY
          echo "- [Examples](https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.version }}/sbom-tools-examples-${{ needs.create-release.outputs.version }}.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/sbom-generator:${{ needs.create-release.outputs.version }}   # legacy alias: sbom-scanner" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
