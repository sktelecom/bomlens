name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      
      - name: Grant script permissions
        run: |
          chmod +x scripts/scan-sbom.sh
          chmod +x tests/test-scan.sh
      
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          VERBOSE=true ./tests/test-scan.sh
        continue-on-error: false
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-logs
          path: tests/test-workspace/failed-tests-logs/
          retention-days: 7
      
      - name: Upload generated SBOMs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-sbom-files
          path: tests/test-workspace/*_bom.json
          retention-days: 7
          if-no-files-found: ignore
  
  lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      
      - name: Lint Bash scripts
        run: |
          echo "Linting shell scripts..."
          echo "Checking scripts/scan-sbom.sh..."
          shellcheck scripts/scan-sbom.sh || true
          echo ""
          echo "Checking scripts/check-setup.sh..."
          shellcheck scripts/check-setup.sh || true
          echo ""
          echo "Checking docker/entrypoint.sh..."
          shellcheck docker/entrypoint.sh || true
          echo ""
          echo "Checking docker/lib/scan-firmware.sh..."
          shellcheck docker/lib/scan-firmware.sh || true
          echo ""
          echo "Checking docker/lib analyze scripts..."
          shellcheck docker/lib/validate-sbom.sh docker/lib/convert-to-cdx.sh docker/lib/generate-risk-report.sh || true
          echo ""
          echo "Checking docker/lib post-process scripts..."
          shellcheck docker/lib/normalize-sbom.sh docker/lib/generate-notice.sh docker/lib/stamp-metadata.sh docker/lib/source-detect.sh docker/lib/build-prep.sh docker/lib/identify-vendored.sh docker/lib/suggest-vendored.sh docker/lib/reconcile-vendored.sh || true
          echo ""
          echo "Checking tests/test-scan.sh..."
          shellcheck tests/test-scan.sh || true
          echo ""
          echo "Checking new test/helper scripts..."
          shellcheck tests/test-postprocess.sh tests/check-examples-sync.sh examples/test-all.sh || true
          echo ""
          echo "✅ Shellcheck completed (warnings are informational)"
      
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error
        continue-on-error: true

  contract:
    name: No-Docker Contract Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Exercises scan-sbom.sh orchestration (arg parsing, language detection,
      # image selection, mode routing, zip/git ingestion) with a stub docker —
      # no daemon, no scanner image. On windows-latest this runs under the
      # runner's Git Bash (MSYS2), guarding the actual Windows CLI path.
      - name: Run no-Docker orchestration tests
        shell: bash
        run: bash tests/test-windows.sh

  postprocess:
    name: Post-process Unit and Sync Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No Docker: drives the jq/bash post-processing scripts against regression
      # fixtures (byte-stable venv pinning, null components, metadata stamping,
      # NOTICE dedupe) and keeps the example set in sync with the guide and
      # test-all.sh. Guards the verification-report defects B-1..B-6 cheaply.
      - name: Post-process unit tests
        run: bash tests/test-postprocess.sh

      - name: Examples / docs / test-all.sh sync check
        run: bash tests/check-examples-sync.sh

      - name: Examples manifest validation
        run: bash examples/test-all.sh

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Check required documentation
        run: |
          echo "Checking documentation files..."
          
          # Main README (Required)
          if [ -f README.md ]; then
            echo "✓ README.md found"
          else
            echo "❌ README.md not found"
            exit 1
          fi
          
          # Check if docs directory exists
          if [ ! -d docs ]; then
            echo "⚠️ docs/ directory not found - skipping doc checks"
            exit 0
          fi
          
          # User documentation (if exists)
          for doc in getting-started.md usage-guide.md examples-guide.md; do
            if [ -f "docs/$doc" ]; then
              echo "✓ docs/$doc found"
            else
              echo "⚠️ docs/$doc not found (optional)"
            fi
          done
          
          # Docker documentation
          if [ -f docker/README.md ]; then
            echo "✓ docker/README.md found"
          else
            echo "⚠️ docker/README.md not found (optional)"
          fi
          
          echo ""
          echo "✅ Documentation check completed"
      
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 # v1
        with:
          config-file: '.github/markdown-link-check-config.json'
          use-quiet-mode: 'yes'
        continue-on-error: true
  
  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        example: [java-maven, java-gradle, nodejs, python, go, ruby, php, rust, dotnet, swift]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Validate ${{ matrix.example }} structure
        run: |
          echo "Validating ${{ matrix.example }} example..."
          
          if [ ! -d "examples/${{ matrix.example }}" ]; then
            echo "❌ examples/${{ matrix.example }} directory not found"
            exit 1
          fi
          
          cd examples/${{ matrix.example }}
          
          # Check README exists
          if [ ! -f README.md ]; then
            echo "❌ README.md not found in ${{ matrix.example }}"
            exit 1
          fi
          echo "✓ README.md found"
          
          # Check manifest file based on example type
          case "${{ matrix.example }}" in
            java-maven)
              if [ -f pom.xml ] && [ -d src ]; then
                echo "✓ Maven project structure valid"
              else
                echo "❌ Missing pom.xml or src/"
                exit 1
              fi
              ;;
            java-gradle)
              if [ -f build.gradle ]; then
                echo "✓ Gradle project structure valid"
              else
                echo "❌ Missing build.gradle"
                exit 1
              fi
              ;;
            nodejs)
              if [ -f package.json ]; then
                echo "✓ Node.js project structure valid"
              else
                echo "❌ Missing package.json"
                exit 1
              fi
              ;;
            python)
              if [ -f requirements.txt ]; then
                echo "✓ Python project structure valid"
              else
                echo "❌ Missing requirements.txt"
                exit 1
              fi
              ;;
            go)
              if [ -f go.mod ]; then
                echo "✓ Go project structure valid"
              else
                echo "❌ Missing go.mod"
                exit 1
              fi
              ;;
            ruby)
              if [ -f Gemfile ]; then
                echo "✓ Ruby project structure valid"
              else
                echo "❌ Missing Gemfile"
                exit 1
              fi
              ;;
            php)
              if [ -f composer.json ]; then
                echo "✓ PHP project structure valid"
              else
                echo "❌ Missing composer.json"
                exit 1
              fi
              ;;
            rust)
              if [ -f Cargo.toml ]; then
                echo "✓ Rust project structure valid"
              else
                echo "❌ Missing Cargo.toml"
                exit 1
              fi
              ;;
            dotnet)
              if ls *.csproj > /dev/null 2>&1; then
                echo "✓ .NET project structure valid"
              else
                echo "❌ Missing .csproj file"
                exit 1
              fi
              ;;
            swift)
              if [ -f Package.swift ]; then
                echo "✓ Swift project structure valid"
              else
                echo "❌ Missing Package.swift"
                exit 1
              fi
              ;;
          esac
          
          echo "✅ ${{ matrix.example }} validation passed"
  
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, contract, postprocess, lint, validate-docs, validate-examples]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| No-Docker Contract (ubuntu+windows) | ${{ needs.contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-process & Sync | ${{ needs.postprocess.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.validate-docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Examples | ${{ needs.validate-examples.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Only fail if critical tests failed
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Integration tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.contract.result }}" == "failure" ]; then
            echo "❌ No-Docker contract tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.postprocess.result }}" == "failure" ]; then
            echo "❌ Post-process / sync tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.validate-examples.result }}" == "failure" ]; then
            echo "❌ Example validation failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Critical checks passed" >> $GITHUB_STEP_SUMMARY
            if [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.validate-docs.result }}" == "failure" ]; then
              echo "⚠️ Some non-critical checks have warnings" >> $GITHUB_STEP_SUMMARY
            fi
          fi
