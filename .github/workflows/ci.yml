name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # The three defaults must be listed explicitly: naming any type replaces
    # the default set. `labeled` lets the run-heavy-e2e label re-trigger CI so
    # the heavy suites below can run on an opted-in PR.
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:
    inputs:
      firmware:
        description: "Also build the firmware image and run the firmware e2e group in full-e2e"
        type: boolean
        default: false
      deep_license:
        description: "Also build the deep-license (scancode) image; its build gate runs a real license scan"
        type: boolean
        default: false
      reseed_visual:
        description: "Regenerate ALL UI visual baselines in the pinned container and upload them as an artifact (commit the ones that changed)"
        type: boolean
        default: false
      reseed_guide_shots:
        description: "Regenerate the docs/images guide screenshots (npm run capture:ui) in the pinned container and upload them (commit the ones that changed)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      
      - name: Grant script permissions
        run: |
          chmod +x scripts/scan-sbom.sh
          chmod +x tests/test-scan.sh
      
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          VERBOSE=true ./tests/test-scan.sh
        continue-on-error: false
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-logs
          path: tests/test-workspace/failed-tests-logs/
          retention-days: 7
      
      - name: Upload generated SBOMs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-sbom-files
          path: tests/test-workspace/**/*_bom.json
          retention-days: 7
          if-no-files-found: ignore
  
  lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      
      - name: Lint Bash scripts
        run: |
          echo "Linting every tracked shell script (severity: warning and above)..."
          # shellcheck exits non-zero on any finding at or above the configured
          # severity, and there is no `|| true`, so a real issue fails this job.
          # We gate at `warning` (genuine bugs: unsafe word splitting, unused
          # assignments, array/string mix-ups); style/info notes stay ungated.
          # Linting the tracked file list means new scripts are covered without
          # editing this workflow.
          git ls-files -z '*.sh' | xargs -0 shellcheck --severity=warning
          echo "✅ Shellcheck passed (warning severity and above)"
      
      # Blocking at error level (warnings stay advisory); the Dockerfile passes
      # this threshold today, so a new error-level finding should fail the build.
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

  contract:
    name: No-Docker Contract Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Exercises scan-sbom.sh orchestration (arg parsing, language detection,
      # image selection, mode routing, zip/git ingestion) with a stub docker —
      # no daemon, no scanner image. On windows-latest this runs under the
      # runner's Git Bash (MSYS2), guarding the actual Windows CLI path.
      - name: Run no-Docker orchestration tests
        shell: bash
        run: bash tests/test-windows.sh

      # The .bat entry points a Windows user actually runs (double-click,
      # cmd) are a separate layer — cmd.exe parsing, Git Bash discovery,
      # PATHEXT resolution — that the bash suite above bypasses. Execute
      # them for real under cmd.exe with a stub docker.exe on PATH.
      - name: Run .bat wrapper contract tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/test-bat-contract.ps1

  desktop-linux:
    name: Desktop boot tests (linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Unit tests (boot/container/health/i18n/log/update/winstate)
        run: node --test test/*.test.mjs

      # Runs on EVERY PR (not just electron/**): the boot-recovery spec's fake
      # docker boots the real docker/web/server.py through the app's genuine
      # startup path, so a server.py change that breaks the desktop boot
      # contract is caught here — desktop.yml's path filter would miss it.
      # Smoke + recovery are deterministic (no daemon, no image pull).
      - name: Boot smoke + recovery e2e (xvfb)
        run: xvfb-run --auto-servernum npm run test:smoke

  postprocess:
    name: Post-process Unit and Sync Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No Docker: drives the jq/bash post-processing scripts against regression
      # fixtures (byte-stable venv pinning, null components, metadata stamping,
      # NOTICE dedupe) and keeps the example set in sync with the guide and
      # test-all.sh. Guards the verification-report defects B-1..B-6 cheaply.
      - name: Post-process unit tests
        run: bash tests/test-postprocess.sh

      - name: Merge-mode unit tests
        run: bash tests/test-merge.sh

      - name: Output regression snapshots
        run: bash tests/test-snapshot.sh

      - name: AI SBOM post-process tests
        run: bash tests/test-aibom.sh

      - name: Vendored-OSS adversarial tests
        run: bash tests/test-vendored-adversarial.sh

      - name: iOS lockfile coverage (CocoaPods merge; syft when Docker present)
        run: bash tests/test-ios.sh

      - name: Web UI server contract tests (upload round-trip)
        run: bash tests/test-web-ui.sh

      - name: Examples / docs / test-all.sh sync check
        run: bash tests/check-examples-sync.sh

      - name: Docs / tool drift check (flags, env vars, image names, download, output dir)
        run: bash tests/check-docs-drift.sh

      - name: Examples manifest validation
        run: bash examples/test-all.sh

      # Machine-checkable proxies for a friendly first run: no silent error
      # exits, check-setup parity across .sh/.bat, and a complete --help.
      - name: UX heuristics
        run: bash scripts/check-ux-heuristics.sh

  # PR-only path detection for the path-filtered heavy jobs below. Plain git
  # diff against the PR base (no third-party action): base.sha is the base at
  # sync time and HEAD is the virtual merge commit of base + head, so
  # `git diff base HEAD` is exactly the PR's change set.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Classify changed paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          changed="$(git diff --name-only "$BASE_SHA" HEAD)"
          echo "$changed"
          if echo "$changed" | grep -qE '^(docker/web/|docker/Dockerfile|docker/entrypoint\.sh|scripts/scan-sbom\.sh|tests/test-web-e2e\.sh|\.github/workflows/heavy-e2e\.yml)'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  # The three heavy suites live in the reusable heavy-e2e.yml (shared with the
  # nightly full run, so the step definitions cannot drift). Gating:
  #   - web-e2e: main pushes, dispatch, AND pull requests that touch the web
  #     stack (docker/web/**, image entry, its own harness) — the layer where a
  #     PR regression is most user-visible and the always-on contract suite
  #     cannot see container wiring.
  #   - full-e2e / docs-walkthrough: main pushes and dispatch (scanner PRs
  #     already run the real-Docker integration suite); the nightly run bounds
  #     drift on quiet days to 24h. A PR can opt in by adding the
  #     run-heavy-e2e label (e.g. a risky scanner or docs change).
  web-e2e:
    name: Web UI E2E
    needs: [changes]
    if: >-
      !cancelled() && (
        github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'))
    uses: ./.github/workflows/heavy-e2e.yml
    with:
      suites: web-e2e

  full-e2e:
    name: Full CLI E2E
    if: >-
      github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-heavy-e2e'))
    uses: ./.github/workflows/heavy-e2e.yml
    with:
      suites: full-e2e
      firmware: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.firmware == 'true' }}
      deep_license: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deep_license == 'true' }}
      # On push, scan a representative subset (npm/pip/gomod) to bound runtime;
      # manual dispatch (ONLY empty) scans every bundled example.
      examples_only: ${{ github.event_name == 'push' && 'nodejs python go' || '' }}

  docs-walkthrough:
    name: Docs Walkthrough
    if: >-
      github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-heavy-e2e'))
    uses: ./.github/workflows/heavy-e2e.yml
    with:
      suites: docs-walkthrough

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Check required documentation
        run: |
          echo "Checking documentation files..."
          
          # Main README (Required)
          if [ -f README.md ]; then
            echo "✓ README.md found"
          else
            echo "❌ README.md not found"
            exit 1
          fi
          
          # Check if docs directory exists
          if [ ! -d docs ]; then
            echo "⚠️ docs/ directory not found - skipping doc checks"
            exit 0
          fi
          
          # User documentation (if exists)
          for doc in getting-started.md usage-guide.md examples-guide.md; do
            if [ -f "docs/$doc" ]; then
              echo "✓ docs/$doc found"
            else
              echo "⚠️ docs/$doc not found (optional)"
            fi
          done
          
          # Docker documentation
          if [ -f docker/README.md ]; then
            echo "✓ docker/README.md found"
          else
            echo "⚠️ docker/README.md not found (optional)"
          fi
          
          echo ""
          echo "✅ Documentation check completed"
      
      # Advisory by design: this step checks EXTERNAL links, which fail for
      # reasons outside the repo (rate limits, transient outages), so it must
      # not block merges. Internal links are hard-gated separately by
      # scripts/check-doc-links.sh (doc-coverage job) and `mkdocs build --strict`.
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 # v1
        with:
          config-file: '.github/markdown-link-check-config.json'
          use-quiet-mode: 'yes'
        continue-on-error: true
  
  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        example: [java-maven, java-gradle, nodejs, python, go, ruby, php, rust, dotnet, swift]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Validate ${{ matrix.example }} structure
        run: |
          echo "Validating ${{ matrix.example }} example..."
          
          if [ ! -d "examples/${{ matrix.example }}" ]; then
            echo "❌ examples/${{ matrix.example }} directory not found"
            exit 1
          fi
          
          cd examples/${{ matrix.example }}
          
          # Check README exists
          if [ ! -f README.md ]; then
            echo "❌ README.md not found in ${{ matrix.example }}"
            exit 1
          fi
          echo "✓ README.md found"
          
          # Check manifest file based on example type
          case "${{ matrix.example }}" in
            java-maven)
              if [ -f pom.xml ] && [ -d src ]; then
                echo "✓ Maven project structure valid"
              else
                echo "❌ Missing pom.xml or src/"
                exit 1
              fi
              ;;
            java-gradle)
              if [ -f build.gradle ]; then
                echo "✓ Gradle project structure valid"
              else
                echo "❌ Missing build.gradle"
                exit 1
              fi
              ;;
            nodejs)
              if [ -f package.json ]; then
                echo "✓ Node.js project structure valid"
              else
                echo "❌ Missing package.json"
                exit 1
              fi
              ;;
            python)
              if [ -f requirements.txt ]; then
                echo "✓ Python project structure valid"
              else
                echo "❌ Missing requirements.txt"
                exit 1
              fi
              ;;
            go)
              if [ -f go.mod ]; then
                echo "✓ Go project structure valid"
              else
                echo "❌ Missing go.mod"
                exit 1
              fi
              ;;
            ruby)
              if [ -f Gemfile ]; then
                echo "✓ Ruby project structure valid"
              else
                echo "❌ Missing Gemfile"
                exit 1
              fi
              ;;
            php)
              if [ -f composer.json ]; then
                echo "✓ PHP project structure valid"
              else
                echo "❌ Missing composer.json"
                exit 1
              fi
              ;;
            rust)
              if [ -f Cargo.toml ]; then
                echo "✓ Rust project structure valid"
              else
                echo "❌ Missing Cargo.toml"
                exit 1
              fi
              ;;
            dotnet)
              if ls *.csproj > /dev/null 2>&1; then
                echo "✓ .NET project structure valid"
              else
                echo "❌ Missing .csproj file"
                exit 1
              fi
              ;;
            swift)
              if [ -f Package.swift ]; then
                echo "✓ Swift project structure valid"
              else
                echo "❌ Missing Package.swift"
                exit 1
              fi
              ;;
          esac
          
          echo "✅ ${{ matrix.example }} validation passed"
  
  ui:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Token lint (no hardcoded colours)
        run: npm run token:lint
      - name: i18n coverage (en ≡ ko)
        run: npm run i18n:check
      - name: Lib test gate (every src/lib module has a unit test)
        run: npm run test:lib-gate
      - name: Unit tests (Vitest) + coverage thresholds
        run: npm run test:coverage
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run UI tests (functional + axe)
        run: npm run test:ui

  # Visual regression runs in the pinned Playwright container so screenshots are
  # pixel-deterministic and match the committed baselines. First run on a branch
  # without baselines seeds them and uploads an artifact (non-failing); commit
  # those PNGs to turn this into a strict drift gate. When a UI change invalidates
  # only SOME baselines (e.g. a redesigned panel), a partial delete would make the
  # strict run fail on the missing ones — so re-run this workflow with
  # reseed_visual=true to regenerate ALL baselines in the same pinned container and
  # upload them, then commit the ones that actually changed.
  visual:
    name: UI Visual Regression
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    defaults:
      run:
        working-directory: docker/web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install dependencies
        run: npm ci
      - name: Visual regression
        id: visual
        run: |
          if [ "${{ github.event.inputs.reseed_visual }}" = "true" ]; then
            echo "::notice::reseed_visual=true — regenerating ALL baselines. Download the artifact and commit the PNGs that changed."
            npm run test:visual -- --update-snapshots
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          elif ls tests/ui/*-snapshots/*.png >/dev/null 2>&1; then
            echo "Baselines found — running strict visual diff."
            npm run test:visual
          else
            echo "::notice::No visual baselines yet — seeding them. Commit the uploaded PNGs to enable the strict gate."
            npm run test:visual -- --update-snapshots
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload seeded baselines
        if: steps.visual.outputs.seeded == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-baselines
          path: docker/web/frontend/tests/ui/**/*-snapshots/**

  # Guide screenshots (docs/images/web-ui-*.png) are captured by npm run capture:ui
  # in the same pinned container so they render like the visual baselines. They are
  # not a gate — this job only runs on demand (reseed_guide_shots=true), regenerates
  # them, and uploads them as an artifact to download and commit. Run it whenever a
  # UI change makes the guide screenshots stale.
  guide-shots:
    name: Regenerate guide screenshots
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.reseed_guide_shots == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    defaults:
      run:
        working-directory: docker/web/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install dependencies
        run: npm ci
      - name: Capture guide screenshots
        run: npm run capture:ui
      - name: Upload regenerated guide screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: guide-screenshots
          path: docs/images/**

  doc-coverage:
    name: Doc Coverage
    runs-on: ubuntu-latest
    # Reads the scan-mode list from docker/entrypoint.sh and checks every
    # user-facing input form is documented across by-input, ui, cli, architecture,
    # pipeline-by-input and README. A new mode missing from a page fails here.
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check input-form documentation coverage
        run: bash scripts/check-doc-coverage.sh

      # Code->docs gate: every user-facing env var in scan-sbom.sh --help must be
      # documented in the reference pages (the reverse of check-docs-drift.sh).
      - name: Check environment-variable documentation coverage
        run: bash scripts/check-doc-env-coverage.sh

      # Korean prose gate: translation-ese and terminology rules over the
      # public docs surface (scripts/ko-style; decisions recorded in
      # docs/korean-style-guide.md). S1/S2 findings fail the job. The
      # generated fixture proves the linter actually detects violations,
      # so a broken rule catalog cannot pass silently.
      - name: Check Korean documentation style
        run: |
          node scripts/ko-style/lint.mjs --all --no-baseline
          fixture="$RUNNER_TEMP/ko-style-selftest.md"
          printf '%s\n' "스캐너에 의해 생성된 결과가 되어지게 됩니다." "examples 디렉토리에 예제를 추가하고, 지원 종료 뱃지를 확인하세요." > "$fixture"
          if node scripts/ko-style/lint.mjs --files "$fixture" --no-baseline >/dev/null 2>&1; then
            echo "FAIL: the ko-style self-test fixture did not trip the linter."
            exit 1
          fi
          echo "Self-test OK: the fixture trips the linter as expected."

      # Deterministic internal-link gate for the getting-started pages.
      - name: Check onboarding internal links
        run: bash scripts/check-doc-links.sh

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, contract, postprocess, web-e2e, full-e2e, docs-walkthrough, lint, validate-docs, validate-examples, ui, visual, doc-coverage]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| No-Docker Contract (ubuntu+windows) | ${{ needs.contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-process & Sync | ${{ needs.postprocess.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web UI E2E | ${{ needs.web-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full CLI E2E | ${{ needs.full-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Walkthrough | ${{ needs.docs-walkthrough.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.validate-docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Examples | ${{ needs.validate-examples.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI (Playwright) | ${{ needs.ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Visual Regression | ${{ needs.visual.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Doc Coverage | ${{ needs.doc-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Only fail if critical tests failed
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Integration tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.contract.result }}" == "failure" ]; then
            echo "❌ No-Docker contract tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.postprocess.result }}" == "failure" ]; then
            echo "❌ Post-process / sync tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.web-e2e.result }}" == "failure" ]; then
            echo "❌ Web UI e2e failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.full-e2e.result }}" == "failure" ]; then
            echo "❌ Full CLI e2e failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.docs-walkthrough.result }}" == "failure" ]; then
            echo "❌ Docs walkthrough failed (a documented command broke)" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.validate-examples.result }}" == "failure" ]; then
            echo "❌ Example validation failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.ui.result }}" == "failure" ]; then
            echo "❌ UI (Playwright) tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.visual.result }}" == "failure" ]; then
            echo "❌ UI visual regression failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.doc-coverage.result }}" == "failure" ]; then
            echo "❌ Documentation coverage check failed (a scan mode is missing from a page)" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Critical checks passed" >> $GITHUB_STEP_SUMMARY
            if [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.validate-docs.result }}" == "failure" ]; then
              echo "⚠️ Some non-critical checks have warnings" >> $GITHUB_STEP_SUMMARY
            fi
          fi
